<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Advanced Chat Application</title>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto mt-10">
        <div class="bg-white p-5 rounded shadow-md">
            <h1 class="text-2xl font-bold mb-4">Chat Application</h1>
            <div class="chat-box border h-64 overflow-y-scroll p-4 mb-4 bg-gray-50">
                <!-- Chat Messages will appear here -->
            </div>
            <textarea class="border w-full p-2" rows="2" placeholder="Type your message..."></textarea>
            <input type="file" class="my-2" />
            <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Send</button>
        </div>
    </div>
</body>
</html>
